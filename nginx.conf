# ── FitFinder AI — Nginx Load Balancer ────────────────────────────────────────
# Listens on port 80 and distributes requests across all api-gateway instances.
#
# Scale the gateway, then reload nginx:
#   docker-compose up -d --scale api-gateway=3
#   docker-compose exec nginx nginx -s reload
#
# After scaling, docker-compose ps will show 3 api-gateway containers.
# Nginx uses Docker's internal DNS to discover all instances and apply
# least-connections balancing across them.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream pool ────────────────────────────────────────────────────────
    # Docker's embedded DNS (127.0.0.11) resolves "api-gateway" to all running
    # container IPs when the service is scaled.
    # re-resolve every 5 s so new instances are picked up after `--scale`.
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream api_gateway_pool {
        least_conn;

        # Single entry — Docker DNS expands this to all scaled instances.
        server api-gateway:5000 max_fails=3 fail_timeout=30s;

        # Add more static replicas here if you pin instance counts, e.g.:
        # server api-gateway_2:5000 max_fails=3 fail_timeout=30s;
        # server api-gateway_3:5000 max_fails=3 fail_timeout=30s;

        keepalive 32;    # reuse connections to backends
    }

    # ── Main server block ─────────────────────────────────────────────────
    server {
        listen  80;
        server_name _;

        # Increase body limit for image uploads (base64 can be large)
        client_max_body_size 20M;

        location / {
            proxy_pass         http://api_gateway_pool;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — image analysis can take up to ~60 s
            proxy_connect_timeout  10s;
            proxy_send_timeout     90s;
            proxy_read_timeout     90s;

            # Enable HTTP/1.1 keep-alive to the upstream
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
        }

        # Health check endpoint handled by nginx itself (no backend needed)
        location /nginx-health {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}
